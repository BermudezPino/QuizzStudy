[build]
command = "npm run build && node scripts/netlify-postbuild.js"
publish = "dist"

# Cabeceras de seguridad para todas las páginas
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Configuración de headers para la detección de versiones
[[headers]]
for = "/version.json"
[headers.values]
# No permitir caché para version.json
Cache-Control = "no-cache, no-store, must-revalidate"
Pragma = "no-cache"
Expires = "0"

# Configuración para el Service Worker
[[headers]]
for = "/sw.js"
[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

# Redirects para SPA
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
