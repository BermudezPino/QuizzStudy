<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Aplicar tema antes del primer pintado para evitar parpadeo blanco
      (function() {
        var saved = localStorage.getItem('darkMode');
        var dark = saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      /* Modo claro: degradado mínimo sage. Modo oscuro: sin cambios */
      html:not(.dark) body,
      html:not(.dark) #root {
        background-color: #eef5f2 !important;
        background-image: linear-gradient(180deg, #eef5f2 0%, #e8f0ec 100%) !important;
        min-height: 100%;
      }
      html.dark body,
      html.dark #root { background-color: #111827 !important; min-height: 100%; }
    </style>
    <link rel="icon" type="image/svg+xml" href="./src/assets/ico.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Quiz App - Cuestionarios y tests para DAM">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="mask-icon" href="/mask-icon.svg" color="#FFFFFF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Quiz App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
